version: '3.8'

services:
    db:
        image: postgis/postgis:16-3.4
        container_name: pindong-db
        environment:
            POSTGRES_DB: pindong
            POSTGRES_USER: hscloud
            POSTGRES_PASSWORD: 1234
        ports:
            - "5432:5432"
        volumes:
            - pindong-db-data:/var/lib/postgresql/data

volumes:
    pindong-db-data: