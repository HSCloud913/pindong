spring:
    application:
        name: backend

    datasource:
        url: jdbc:postgresql://localhost:5432/pindong
        username: hscloud
        password: 1234
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        open-in-view: false
        properties:
            hibernate:
                format_sql: true

    data:
        redis:
          host: localhost
          port: 6379

    flyway:
      enabled: true
      baseline-on-migrate: true
      locations: classpath:db/migration

    security:
        oauth2:
            client:
              registration:
                google:
                  client-id: ${GOOGLE_CLIENT_ID}
                  client-secret: ${GOOGLE_CLIENT_SECRET}
                  scope:
                      - email
                      - profile

logging:
    level:
        org.springframework.security: DEBUG

jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
    refresh-expiration: 604800000

server:
    port: 8080
